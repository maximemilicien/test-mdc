<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDC — Accès Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg-void: #0a0d12;
    --bg-panel: #12161d;
    --bg-panel-raised: #171c25;
    --line: #232935;
    --line-bright: #333c4d;
    --red: #c23b3b;
    --red-glow: #e0524f;
    --green: #4a9d6f;
    --blue: #2f5fa8;
    --blue-glow: #5b9bf0;
    --text-primary: #e8ebf0;
    --text-dim: #7a8494;
    --text-faint: #4a5262;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  html { scroll-behavior: smooth; }

  /* Animations courtes : l'interface parait reactive sans alourdir la page. */
  .rapport-mdc-wrap { animation: apparitionDouce .18s ease-out both; }
  .rapport-mdc-card, .rapport-validation-item { transition: border-color .16s ease, background .16s ease, transform .16s ease; }
  .rapport-validation-item:hover { border-color: rgba(93, 201, 247, .45); background: rgba(13, 61, 90, .18); }
  .rapport-validation-btn { transition: transform .12s ease, filter .12s ease, background .12s ease; }
  .rapport-validation-btn:active { transform: scale(.97); }
  .rapport-validation-btn:disabled { opacity: .65; cursor: wait; }
  @keyframes apparitionDouce { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    body { background-attachment: scroll; }
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    position: relative;

    /* Fond d'écran MDC */
    background-image: url("image/fond d'écrant mdc.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }

  /* Ambient grid backdrop */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.15;
    mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black, transparent);
    pointer-events: none;
  }

  .side-img {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 26vw;
    max-width: 420px;
    background-size: cover;
    background-position: center;
    z-index: 0;
    pointer-events: none;
  }
  .side-img.left {
    left: 0;
    background-image: url("image/agent-gda-1.png");
    mask-image: linear-gradient(90deg, black 40%, transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, black 40%, transparent 100%);
  }
  .side-img.right {
    right: 0;
    background-image: url("image/agent-gda-2.png");
    mask-image: linear-gradient(270deg, black 40%, transparent 100%);
    -webkit-mask-image: linear-gradient(270deg, black 40%, transparent 100%);
  }

  .console {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
    transition: max-width 0.4s ease;
  }
  .console.expanded {
    max-width: 1400px;
  }

  /* Header */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 28px;
    text-align: center;
  }

  .crest {
    width: 180px;
    height: 180px;
    flex-shrink: 0;
    position: relative;
    perspective: 400px;
    margin-bottom: 14px;
  }
  .crest::before {
    content: '';
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(224, 82, 79, 0.35) 0%, transparent 70%);
    filter: blur(6px);
    z-index: 0;
  }
  .coin {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: spinY 6s linear infinite;
    z-index: 1;
  }
  .coin-layer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
  }
  .coin-layer img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }
  .coin-front img {
    filter: drop-shadow(0 0 18px rgba(224, 82, 79, 0.5));
  }
  @keyframes spinY {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
  }

  .header-text .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    color: var(--red-glow);
    text-transform: uppercase;
    font-weight: 700;
  }
  .header-text h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-top: 4px;
  }

  /* Panel */
  .panel {
    background: transparent;
    border: none;
    border-radius: 4px;
    overflow: hidden;
    backdrop-filter: none;
  }

  .panel-strip {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    opacity: 0.6;
  }

  .panel-body { padding: 32px 28px; }

  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: block;
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  .input-scan {
    position: relative;
    flex: 1;
  }

  #matricule, #discordIdVerif {
    width: 100%;
    background: var(--bg-void);
    border: 1px solid var(--line-bright);
    border-radius: 3px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  #matricule::placeholder, #discordIdVerif::placeholder { color: var(--text-faint); letter-spacing: normal; font-weight: 400; }
  #matricule:focus, #discordIdVerif:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(194, 59, 59, 0.12);
  }

  .btn-verify {
    background: var(--bg-panel-raised);
    border: 1px solid var(--line-bright);
    border-radius: 3px;
    padding: 0 20px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .btn-verify:hover:not(:disabled) { border-color: var(--red); color: var(--red-glow); }
  .btn-verify:active:not(:disabled) { transform: scale(0.97); }
  .btn-verify:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Status area */
  .big-status {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 18px 0 4px;
    opacity: 0;
    transform: scale(0.9);
    animation: bigStatusIn 0.4s ease forwards;
  }
  .big-status.ok { color: var(--green); text-shadow: 0 0 24px rgba(74, 157, 111, 0.6); }
  .big-status.fail { color: var(--red-glow); text-shadow: 0 0 24px rgba(224, 82, 79, 0.6); }
  @keyframes bigStatusIn { to { opacity: 1; transform: scale(1); } }

  .status-zone {
    margin-top: 20px;
    min-height: 0;
    overflow: hidden;
    transition: min-height 0.35s ease;
  }
  .status-zone.active { min-height: 64px; }

  .status-line {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--bg-void);
    opacity: 0;
    transform: translateY(-4px);
    animation: statusIn 0.3s ease forwards;
  }
  @keyframes statusIn { to { opacity: 1; transform: translateY(0); } }

  .status-line.scanning { color: var(--text-dim); }
  .status-line.ok { color: var(--green); border-color: rgba(74, 157, 111, 0.35); }
  .status-line.fail { color: var(--red-glow); border-color: rgba(194, 59, 59, 0.35); }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.scanning { background: var(--text-dim); animation: pulse 1s ease-in-out infinite; }
  .dot.ok { background: var(--green); }
  .dot.fail { background: var(--red-glow); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .scan-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }
  .scan-percent {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 34px;
    text-align: right;
    flex-shrink: 0;
  }
  .scan-bar {
    flex: 1;
    height: 2px;
    background: var(--bg-void);
    border-radius: 2px;
    overflow: hidden;
  }
  .scan-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--red-glow);
    border-radius: 2px;
  }
  /* Le remplissage de la barre est piloté en JS pour rester synchronisé avec le %. */

  /* Result / action zone */
  .action-zone {
    margin-top: 18px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .action-zone.open { max-height: 900px; }

  .id-card {
    background: var(--bg-panel-raised);
    border: 1px solid rgba(74, 157, 111, 0.3);
    border-radius: 3px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    opacity: 0;
    transform: translateY(6px);
  }
  .action-zone.open .id-card { animation: statusIn 0.4s ease 0.1s forwards; }

  .id-card-info .id-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .id-card-info .id-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .btn-access {
    background: var(--green);
    color: #0a0d12;
    border: none;
    border-radius: 3px;
    padding: 11px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  .btn-access:hover { filter: brightness(1.12); }
  .btn-access:active { transform: scale(0.96); }

  .btn-site-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    background: var(--green);
    color: #0a0d12;
    text-decoration: none;
    border-radius: 3px;
    padding: 14px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  .btn-site-link:hover { filter: brightness(1.12); }
  .btn-site-link:active { transform: scale(0.97); }

  .docs-panel {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--line-bright);
  }
  .docs-panel .docs-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .doc-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: var(--bg-panel-raised);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px 14px;
    margin-bottom: 8px;
    color: var(--text-primary);
    text-decoration: none;
    font-size: 13px;
    transition: border-color 0.15s ease;
  }
  .doc-link:hover { border-color: var(--red); color: var(--red-glow); }
  .doc-link .arrow { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  .menu-boutons {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 60px 40px;
    max-width: 480px;
    margin: 0 auto;
  }
  .btn-lien-mdc {
    background: rgba(20, 40, 74, 0.92);
    border: 1px solid var(--blue);
    border-radius: 4px;
    padding: 22px 24px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-lien-mdc:hover { border-color: var(--blue-glow); color: var(--blue-glow); box-shadow: 0 0 0 3px rgba(91, 155, 240, 0.18); }
  .btn-lien-mdc:active { transform: scale(0.98); }

  /* Mode "menu de boutons" (Milo / Foxtrot / Beta / Echo) :
     boutons fixés en haut à gauche, les boutons restent visibles
     même après avoir ouvert un lien. */
  body.mode-boutons .menu-boutons {
    position: fixed;
    top: 50%;
    left: 24px;
    transform: translateY(-50%);
    padding: 0;
    margin: 0;
    max-width: 260px;
    z-index: 30;
  }
  body.mode-boutons #contenuLienMDC .iframe-wrap { margin-left: 300px; width: calc(100% - 300px); }

  /* Le logo animé ne descend en bas à droite qu'une fois qu'un lien a été ouvert. */
  body.lien-ouvert .header {
    position: fixed;
    bottom: 24px;
    right: 24px;
    margin: 0;
    z-index: 20;
    pointer-events: none;
  }
  body.lien-ouvert .crest {
    width: 90px;
    height: 90px;
    margin-bottom: 8px;
  }
  body.lien-ouvert .header-text .eyebrow { font-size: 9px; }
  body.lien-ouvert .header-text h1 { font-size: 14px; }

  .iframe-wrap {
    width: 100%;
    height: 88vh;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--line-bright);
  }
  .iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* === Salon Rapport MDC GDA === */
  .rapport-mdc-wrap {
    width: 100%;
    min-height: 620px;
    padding: 26px;
    border: 1px solid rgba(88, 175, 224, 0.35);
    border-radius: 16px;
    background:
      radial-gradient(circle at 88% 5%, rgba(46, 132, 173, 0.25), transparent 28%),
      linear-gradient(145deg, #0c1d32, #071321 68%);
    box-shadow: 0 24px 55px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }
  .rapport-mdc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 19px 21px;
    border: 1px solid rgba(74, 178, 224, 0.36);
    border-radius: 13px;
    background: rgba(4, 20, 35, 0.62);
  }
  .rapport-mdc-kicker { font: 700 10px 'JetBrains Mono', monospace; letter-spacing: .16em; color: #70c9f5; text-transform: uppercase; }
  .rapport-mdc-header h2 { margin-top: 4px; font-size: 25px; letter-spacing: -.03em; }
  .rapport-mdc-subtitle { margin-top: 4px; color: #8faec4; font-size: 12px; }
  .rapport-mdc-stats { display: flex; gap: 9px; }
  .rapport-stat { min-width: 76px; padding: 9px 12px; border: 1px solid rgba(94, 185, 229, 0.3); border-radius: 9px; background: rgba(17, 50, 75, 0.45); text-align: center; }
  .rapport-stat strong { display: block; font: 800 19px 'JetBrains Mono', monospace; color: #d9f3ff; }
  .rapport-stat span { display: block; margin-top: 2px; font: 700 8px 'JetBrains Mono', monospace; letter-spacing: .08em; color: #78a9c7; text-transform: uppercase; }
  .rapport-mdc-grid { display: grid; grid-template-columns: minmax(0, 1.12fr) minmax(300px, .88fr); gap: 18px; margin-top: 18px; }
  .rapport-mdc-card { border: 1px solid rgba(73, 153, 202, 0.3); border-radius: 13px; background: rgba(5, 21, 35, 0.64); overflow: hidden; }
  .rapport-mdc-card-head { padding: 16px 19px; border-bottom: 1px solid rgba(73, 153, 202, 0.22); background: rgba(10, 38, 60, 0.45); }
  .rapport-mdc-card-head span { font: 700 9px 'JetBrains Mono', monospace; letter-spacing: .13em; color: #76c8f5; text-transform: uppercase; }
  .rapport-mdc-card-head h3 { margin-top: 4px; font-size: 16px; }
  .rapport-mdc-form { padding: 18px; }
  .rapport-identite { display: flex; align-items: center; gap: 12px; padding: 13px; margin-bottom: 17px; border: 1px solid rgba(85, 180, 227, 0.28); border-radius: 10px; background: linear-gradient(90deg, rgba(13, 61, 90, 0.62), rgba(10, 33, 52, 0.62)); }
  .rapport-identite-icon { width: 39px; height: 39px; display: grid; place-items: center; border-radius: 10px; background: #125188; border: 1px solid #3184bd; font: 800 16px 'JetBrains Mono', monospace; color: #dff5ff; }
  .rapport-identite strong { display: block; font: 700 14px 'JetBrains Mono', monospace; color: #f0f8ff; }
  .rapport-identite span { display: block; margin-top: 3px; color: #a5cee5; font-size: 11px; }
  .rapport-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .rapport-field { display: flex; flex-direction: column; gap: 7px; }
  .rapport-field.full { grid-column: 1 / -1; }
  .rapport-field label { font: 700 10px 'JetBrains Mono', monospace; letter-spacing: .08em; color: #a9d7ef; text-transform: uppercase; }
  .rapport-field input, .rapport-field textarea { width: 100%; border: 1px solid rgba(111, 181, 211, 0.35); border-radius: 8px; background: rgba(1, 13, 23, 0.72); padding: 11px 12px; color: #edf8ff; font: 13px 'Inter', sans-serif; outline: none; transition: border-color .16s ease, box-shadow .16s ease; }
  .rapport-field input { font: 700 18px 'JetBrains Mono', monospace; }
  .rapport-field textarea { min-height: 123px; resize: vertical; line-height: 1.45; }
  .rapport-field input:focus, .rapport-field textarea:focus { border-color: #5dc9f7; box-shadow: 0 0 0 3px rgba(93, 201, 247, .12); }
  .rapport-submit { width: 100%; margin-top: 16px; border: 1px solid #45b5e4; border-radius: 8px; padding: 12px 15px; background: linear-gradient(135deg, #1982ba, #13518e); color: #fff; font: 800 12px 'JetBrains Mono', monospace; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; box-shadow: 0 8px 18px rgba(17, 111, 169, .28); transition: transform .16s ease, filter .16s ease; }
  .rapport-submit:hover { filter: brightness(1.14); transform: translateY(-1px); }
  .rapport-submit:disabled { opacity: .6; cursor: wait; transform: none; }
  .rapport-feedback { min-height: 16px; margin-top: 10px; font: 11px 'JetBrains Mono', monospace; color: #8db5ca; }
  .rapport-feedback.ok { color: #76e3b2; }.rapport-feedback.fail { color: #ff9d99; }
  .rapport-history { max-height: 430px; overflow-y: auto; padding: 5px 16px 16px; }
  .rapport-history-empty { padding: 74px 18px; text-align: center; color: #7da0b5; font-size: 12px; }
  .rapport-history-empty .empty-icon { display: block; margin-bottom: 10px; font-size: 31px; }
  .rapport-history-item { position: relative; padding: 15px 0 15px 17px; border-bottom: 1px solid rgba(99, 166, 195, .16); }
  .rapport-history-item::before { content: ''; position: absolute; left: 0; top: 20px; width: 7px; height: 7px; border-radius: 50%; background: #5bc4ee; box-shadow: 0 0 10px #5bc4ee; }
  .rapport-history-top { display: flex; justify-content: space-between; gap: 8px; color: #a4c9dd; font: 10px 'JetBrains Mono', monospace; }
  .rapport-history-values { display: flex; gap: 7px; margin-top: 8px; }
  .rapport-history-values span { padding: 4px 7px; border-radius: 5px; background: rgba(36, 116, 156, .28); color: #cceeff; font: 700 10px 'JetBrains Mono', monospace; }
  .rapport-history-comment { margin-top: 8px; color: #e2f0f7; font-size: 12px; line-height: 1.45; white-space: pre-wrap; }
  .rapport-history-sync { margin-top: 7px; color: #ffac9f; font: 700 9px 'JetBrains Mono', monospace; letter-spacing: .06em; text-transform: uppercase; }
  .rapport-validation { margin-top: 18px; border: 1px solid rgba(237, 183, 77, .34); border-radius: 11px; background: rgba(83, 57, 11, .13); overflow: hidden; }
  .rapport-validation-head { padding: 12px 14px; border-bottom: 1px solid rgba(237, 183, 77, .22); color: #ffe6a1; font: 800 10px 'JetBrains Mono', monospace; letter-spacing: .08em; text-transform: uppercase; }
  .rapport-validation-item { padding: 12px 14px; border-bottom: 1px solid rgba(237, 183, 77, .13); }
  .rapport-validation-item:last-child { border-bottom: 0; }
  .rapport-validation-item strong { color: #f8fbff; font-size: 13px; }
  .rapport-validation-item p { margin-top: 6px; color: #bdd0d9; font-size: 11px; line-height: 1.4; white-space: pre-wrap; }
  .rapport-validation-actions { display: flex; gap: 8px; margin-top: 10px; }

<script>
  // === Source des matricules : Google Sheet en direct ===
  const SHEET_ID = '1dzJuItFv1XKjbhuyz-qkrWLdWkA-T1aY2vDWmCw36Ew';
  const SHEET_NOM_ONGLET = 'Feuille 1';
  const SHEET_JSON_URL = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NOM_ONGLET)}`;

  // Le Worker réalise la connexion OAuth Discord et vérifie côté serveur que
  // l'identifiant du compte Discord connecté appartient bien au matricule.
  const DISCORD_AUTH_WORKER_URL = 'https://mdc-discord-auth.gdamaxime.workers.dev';

  // === Source des identifiants Discord (double vérification) : onglet "parametre" ===
  const SHEET_ONGLET_PARAMETRE = 'parametre';
  const SHEET_JSON_URL_PARAMETRE = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_ONGLET_PARAMETRE)}`;

  // === Écriture dans le Google Sheet (ajout de nom + modification de l'effectif) ===
  // opensheet.elk.sh ne permet que la LECTURE. Pour écrire dans le Sheet depuis le
  // site, il faut déployer le petit script "Apps Script" fourni séparément
  // (AppsScript_MDC_GDA.gs) en tant que Web App, puis coller son URL ci-dessous.
  // Tant que cette URL n'est pas renseignée, l'ajout de nom et la modification de
  // l'effectif afficheront un message d'erreur au lieu d'écrire dans le Sheet.
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwqHg-kmr0gqleh8SE6Mb6D709EDSHEPJ41Bg2IIc0oSkPTLZ3pwGGz_liKE1S9YM4_Zg/exec';

  async function appelerWebApp(action, donnees) {
    if (!WEBAPP_URL || WEBAPP_URL.startsWith('COLLEZ_ICI')) {
      throw new Error("L'URL de l'Apps Script n'a pas été configurée (voir WEBAPP_URL dans le code).");
    }
    const reponse = await fetch(WEBAPP_URL, {
      method: 'POST',
      // Content-Type text/plain évite le pré-vol CORS (requête simple),
      // le Apps Script lit quand même du JSON dans e.postData.contents.
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...donnees })
    });
    const texte = await reponse.text();
    let resultat;
    try {
      resultat = JSON.parse(texte);
    } catch (e) {
      throw new Error('Réponse invalide du serveur de mise à jour.');
    }
    if (!resultat.ok) {
      throw new Error(resultat.erreur || "Échec de l'opération.");
    }
    return resultat;
  }

  async function envoyerMiseAJourEffectif(matricule, champs) {
    return appelerWebApp('modifierEffectif', { matricule, champs });
  }

  async function ajouterNomParametre(nom) {
    return appelerWebApp('ajouterNom', { nom });
  }

  // === Documents supplémentaires par matricule (double vérification requise) ===
  // Ajoute ou modifie les entrées ci-dessous : clé = matricule en minuscule.
  // Chaque matricule listé ici devra confirmer son identifiant Discord avant d'accéder au site ET verra ces documents.

  // === Système de permissions (aligné sur DoubleVerif.gs côté Apps Script) ===
  // Le backend stocke les permissions dans l'onglet "DoubleVerifSite" (slots
  // "Perme X" / état "activer"/"desactiver" par matricule), via les fonctions
  // aPermissionDoubleVerif_ (lecture) et definirPermissionDoubleVerif_ (écriture).
  // Deux actions Web App exposent ça côté site :
  //   - 'lireDoubleVerifSite'  { matricule }              -> { ok, permissions: { nomPermission: bool, ... } }
  //   - 'majDoubleVerifSite'   { matricule, permissions }  -> écrit plusieurs permissions d'un coup
  //
  // Les noms de permission ci-dessous DOIVENT correspondre exactement à ceux
  // utilisés côté serveur : 'validerRapports' et 'supprimerRapports' sont déjà
  // vérifiés par Rapports MDC.gs (aAccesGestionRapports_, validerRapport,
  // supprimerRapport). 'administration' et 'edition_effectif' ne sont
  // vérifiés QUE côté site (comme avant), mais suivent le même mécanisme.
  //
  // Pour ajouter une NOUVELLE fonction protégée (ex : "gérer le matériel") :
  //   1) ajoute une entrée dans FONCTIONS_PERMISSION ci-dessous ;
  //   2) à l'endroit du code à protéger : aPermission(matriculeActif, 'ta_cle') ;
  //   3) si la fonction doit AUSSI être vérifiée côté serveur (recommandé pour
  //      tout ce qui écrit dans le Sheet), ajoute un appel à
  //      aPermissionDoubleVerif_(matricule, 'ta_cle') dans le .gs correspondant
  //      -> regarde validerRapport()/supprimerRapport() dans Rapports MDC.gs,
  //      ce sont les exemples déjà faits.
  const FONCTIONS_PERMISSION = [
    { cle: 'administration', label: 'Administration', description: "Accès au panneau Administration (Effectif réel, Logs, Permission)." },
    { cle: 'edition_effectif', label: "Édition de l'effectif", description: 'Modifier grade / rapport / médaille dans le tableau Effectif.' },
    { cle: 'validerRapports', label: 'Valider les rapports', description: "Voir la file d'attente et valider les rapports envoyés par les médecins." },
    { cle: 'supprimerRapports', label: 'Supprimer les rapports', description: 'Voir la file d\'attente / archives et supprimer un rapport (en attente ou déjà validé).' },
  ];

  // Amorce : ces matricules gardent TOUJOURS la permission "administration",
  // même si leur ligne dans "DoubleVerifSite" est vide, injoignable, ou pas
  // encore créée. Ça évite de se retrouver bloqué·e dehors du panneau
  // Permission (sinon personne ne pourrait plus jamais accorder de permission
  // à personne). Ajoute/retire des matricules ici si besoin.
  const ADMINS_AMORCE = ['foxtrot', 'beta', 'milo', 'echo', 'walkyrie', 'misfit'];

  // Permissions du matricule actuellement connecté (matriculeActif), chargées
  // au login par chargerPermissions(). Structure : { nomPermission: bool }
  let PERMISSIONS_ACTIVES = {};

  function aPermission(matricule, fonction) {
    const val = (matricule || '').toLowerCase();
    if (fonction === 'administration' && ADMINS_AMORCE.includes(val)) return true;
    // On ne connaît les permissions en détail que pour matriculeActif (chargées au login).
    if (val !== (matriculeActif || '').toLowerCase()) return false;
    return PERMISSIONS_ACTIVES[fonction] === true;
  }

  // Miroir de aAccesGestionRapports_ (Rapports MDC.gs) côté site : accès à la
  // file de rapports (lecture) dès qu'on peut valider OU supprimer.
  function aAccesGestionRapports(matricule) {
    return aPermission(matricule, 'validerRapports') || aPermission(matricule, 'supprimerRapports');
  }

  // Vrai si le matricule a au moins une permission active (déclenche la
  // double vérification Discord à la connexion). Interroge directement le
  // backend puisqu'à ce stade matriculeActif n'est pas encore défini.
  async function aAuMoinsUnePermission(matricule) {
    const val = (matricule || '').toLowerCase();
    if (ADMINS_AMORCE.includes(val)) return true;
    try {
      const resultat = await appelerWebApp('lireDoubleVerifSite', { matricule: val });
      return Object.values(resultat.permissions || {}).some((actif) => actif === true);
    } catch (erreur) {
      console.warn('Lecture des permissions impossible, double vérification non déclenchée pour ce matricule.', erreur);
      return false;
    }
  }

  // Charge les permissions du matricule connecté (matriculeActif) depuis le
  // Sheet. Si l'appel échoue (action pas encore déployée côté Apps Script),
  // on continue avec des permissions vides + l'amorce ADMINS_AMORCE, sans
  // bloquer la connexion.
  async function chargerPermissions() {
    PERMISSIONS_ACTIVES = {};
    try {
      const resultat = await appelerWebApp('lireDoubleVerifSite', { matricule: matriculeActif });
      PERMISSIONS_ACTIVES = resultat.permissions || {};
    } catch (erreur) {
      console.warn("Permissions : lecture impossible pour l'instant, seule l'amorce ADMINS_AMORCE est active.", erreur);
    }
  }

  // Lit les permissions d'un matricule QUELCONQUE (utilisé par le panneau
  // Administration > Permission pour gérer les droits des AUTRES).
  async function lireDroitsMatricule(matricule) {
    const resultat = await appelerWebApp('lireDoubleVerifSite', { matricule: (matricule || '').toLowerCase() });
    return resultat.permissions || {};
  }

  // Écrit plusieurs permissions d'un coup pour un matricule.
  // permissions = { validerRapports: true, supprimerRapports: false, ... }
  async function enregistrerDroitsMatricule(matricule, permissions) {
    await appelerWebApp('majDoubleVerifSite', { matricule: (matricule || '').toLowerCase(), permissions });
    if ((matricule || '').toLowerCase() === (matriculeActif || '').toLowerCase()) {
      PERMISSIONS_ACTIVES = { ...PERMISSIONS_ACTIVES, ...permissions };
    }
  }

  const DOCUMENTS_SPECIAUX = {
    'milo': [
      { label: 'Registre confidentiel MDC', url: 'https://example.com/registre-confidentiel' }
    ],
    'walkyrie': [
      { label: 'Registre confidentiel MDC', url: 'https://example.com/registre-confidentiel' }
    ],
    'misfit': [
      { label: 'Protocole médical avancé', url: 'https://example.com/protocole-avance' }
    ],
    'marslu': [
      { label: 'Protocole médical avancé', url: 'https://example.com/protocole-avance' }
    ],

    const debutScan = Date.now();

    scanBarFill.style.width = depart + '%';

      scanBarFill.style.width = pct + '%';
      scanPercent.textContent = pct + '%';
      if (ratio >= 1) clearInterval(intervalleScan);

  // === Journal (Logs) : trace chaque "up" de rapport et chaque médaille donnée ===
  // Stocké dans l'onglet dédié "Logs" du Google Sheet : persistant pour tout
  // le monde, sur tous les appareils/navigateurs. Ne dépend plus du
  // localStorage, qui était propre à un seul navigateur et pouvait être vidé
  // (cache navigateur, navigateur NUI réinitialisé, etc.).
  // Colonnes de l'onglet "Logs" : Date | Nom | Grade | Promo / retro / médaille | Remplie par
  const SHEET_ONGLET_LOGS = 'Logs';
  const SHEET_JSON_URL_LOGS = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_ONGLET_LOGS)}`;

  // Cache local de secours : uniquement utilisé si le Sheet est momentanément
  // injoignable, pour ne jamais afficher un journal vide par erreur réseau.
  const CLE_LOGS_CACHE = 'gdaLogsEffectifCache';
  const CLE_LOGS_MASQUES_LOCAL = 'gdaLogsMasquesLocalement';

  function cleLogLocale(log) {
    return `${log.date || ''}|${log.matricule || ''}|${log.texte || ''}`;
  }

  function lireLogsMasquesLocalement() {
    try { return new Set(JSON.parse(localStorage.getItem(CLE_LOGS_MASQUES_LOCAL) || '[]')); }
    catch (e) { return new Set(); }
  }

  function lireCacheLogs() {
    try {
      const brut = localStorage.getItem(CLE_LOGS_CACHE);
      const logs = brut ? JSON.parse(brut) : [];
      return Array.isArray(logs) ? logs : [];
    } catch (e) {
      return [];
    }
  }

  function ecrireCacheLogs(logs) {
    try {
      localStorage.setItem(CLE_LOGS_CACHE, JSON.stringify(logs.slice(0, 300)));
    } catch (e) {
      // Le cache est un simple confort ; une erreur ici n'est pas bloquante.
    }
  }

  // Charge le journal complet depuis le Sheet (persistant, partagé). En cas
  // d'échec réseau, retombe sur le dernier cache local connu pour éviter un
  // écran vide, plutôt que de faire disparaître les entrées. Fusionne aussi
  // avec le cache local même en cas de succès : si une entrée a été ajoutée
  // localement mais que l'écriture côté Sheet a échoué (ex: action Apps
  // Script manquante), elle reste visible et marquée "non synchronisée" au
  // lieu de disparaître silencieusement au prochain chargement.
  async function chargerLogsEffectif() {
    try {
      const reponse = await fetch(SHEET_JSON_URL_LOGS, { cache: 'no-store' });
      if (!reponse.ok) throw new Error(`Statut HTTP ${reponse.status} pour l'onglet "${SHEET_ONGLET_LOGS}"`);
      const lignes = await reponse.json();
      const logsDistants = lignes
        .map(ligne => ({
          matricule: (ligne['Nom'] || '—').trim(),
          grade: (ligne['Grade'] || '').trim(),
          texte: (ligne['Promo / retro / médaille'] || '').trim(),
          rempliPar: (ligne['Remplie par'] || '').trim(),
          date: (ligne['Date'] || '').trim()
        }))
        .filter(l => l.texte.length > 0);

      const clefDe = (l) => `${l.date}|${l.matricule}|${l.texte}`;
      const clefsDistantes = new Set(logsDistants.map(clefDe));
      const cache = lireCacheLogs();
      const enAttente = cache
        .filter(l => !clefsDistantes.has(clefDe(l)))
        .map(l => ({ ...l, nonSynchronise: true }));

      const masques = lireLogsMasquesLocalement();
      const logs = [...enAttente, ...logsDistants]
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .filter(log => !masques.has(cleLogLocale(log)));
      ecrireCacheLogs(logs);
      return logs;
    } catch (e) {
      console.warn('Journal indisponible depuis le Sheet, utilisation du cache local :', e);
      return lireCacheLogs();
    }
  }

  // Ajoute une entrée au journal : écrite directement dans le Sheet (persiste
  // pour tout le monde) via l'Apps Script existant. Le cache local est aussi
  // mis à jour immédiatement pour un affichage instantané sans attendre un
  // rechargement du Sheet. Retourne true/false selon que l'écriture côté
  // Sheet a réellement réussi (utile pour prévenir l'utilisateur en cas
  // d'échec silencieux, ex: action manquante côté Apps Script).
  async function ajouterLogEffectif(matricule, texte, grade) {
    const entree = {
      matricule: matricule || '—',
      grade: grade || '',
      texte,
      rempliPar: matriculeActif || '—',
      date: new Date().toISOString()
    };
    const cache = lireCacheLogs();
    cache.unshift(entree);
    ecrireCacheLogs(cache);
    try {
      await appelerWebApp('ajouterLog', entree);
      return true;
    } catch (e) {
      console.error('Le log n\'a PAS été écrit dans le Google Sheet (action "ajouterLog" manquante ou en erreur côté Apps Script) :', e);
      return false;
    }
  }

  function formaterDateLog(iso) {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    const jj = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${jj}/${mm} ${hh}:${min}`;
  }

  const COULEURS_GRADE = {

  // === Ajout manuel d'un log (Promo / Rétro / Sanction / Départ / Médaille) ===
  // Formulaire inspiré du modèle fourni ; réutilise le même onglet "Logs" et
  // la même action Apps Script "ajouterLog" que le journal automatique — pas
  // de nouvelle colonne côté Google Sheet, juste un texte mieux structuré.
  const ACTIONS_LOG = ['Promotion', 'Rétrogradation', 'Départ', 'Médaille donnée', 'Médaille retirée'];

  function classeActionLog(action) {
    const a = (action || '').toLowerCase();
    if (a.startsWith('promo')) return 'log-action-promotion';
    if (a.startsWith('rétro') || a.startsWith('retro')) return 'log-action-retrogradation';
    if (a.startsWith('sanction')) return 'log-action-sanction';
    if (a.startsWith('départ') || a.startsWith('depart')) return 'log-action-depart';
    if (a.startsWith('médaille') || a.startsWith('medaille')) return 'log-action-medaille';
    return 'log-action-defaut';
  }

  // Le texte d'un log auto ou manuel suit toujours la forme "Action : reste".
  // On en extrait juste le premier mot pour le badge coloré ; si le texte ne
  // suit pas ce format (ancien log "UP rapport : ..."), pas de badge.
  function decomposerTexteLog(texte) {
    const m = /^([^:]+):\s*(.*)$/.exec(texte || '');
    if (!m) return { action: null, reste: texte || '' };
    return { action: m[1].trim(), reste: m[2].trim() };
  }

  function construireOptionsSelect(valeurs, valeurActuelle, obtenirCouleur) {
    const actuelle = (valeurActuelle || '').trim();
    const correspond = valeurs.some(v => v.toLowerCase() === actuelle.toLowerCase());
    let html = '';
    // Si la valeur actuelle (venant du Sheet) ne fait pas partie de la liste
    // fermée, on l'ajoute quand même en premier pour ne rien écraser tant que
    // personne n'a choisi une nouvelle valeur.
    if (!correspond && actuelle) {
      html += `<option value="${actuelle}" selected>${actuelle}</option>`;
    }
    html += valeurs.map(v => {
      const selectionne = correspond && v.toLowerCase() === actuelle.toLowerCase();
      const couleur = obtenirCouleur ? obtenirCouleur(v) : null;
      const style = couleur ? ` style="background:${couleur.bg};color:${couleur.fg};"` : '';
      return `<option value="${v}" ${selectionne ? 'selected' : ''}${style}>${v}</option>`;
    }).join('');
    return html;
  }

  function optionsResultatPourAction(action) {

    if (!derniereListeEffectif.length) {

  function surChangementNomLog() {
    // Rien à faire pour l'instant : le grade d'origine est relu depuis
    // l'option sélectionnée au moment de la soumission.
  }

  async function soumettreAjoutLog() {
    const selNom = document.getElementById('logAjoutNom');
    const selAction = document.getElementById('logAjoutAction');
    const resultatEl = document.getElementById('logAjoutResultat');
    const raisonEl = document.getElementById('logAjoutRaison');
    const bouton = document.querySelector('.log-add-form .btn-cell-action.enregistrer');
    const msgEl = document.getElementById('logAjoutMsg');
    if (!selNom || !selNom.value) {
      if (msgEl) { msgEl.className = 'log-add-msg fail'; msgEl.textContent = 'Choisis un nom.'; }
      return;
    }

    const nom = selNom.value;
    const gradeOrigine = selNom.selectedOptions[0]?.dataset.grade || '';
    const action = selAction.value;
    const resultat = (resultatEl?.value || '').trim();
    const raison = (raisonEl?.value || '').trim();

    let texte = `${action} : ${resultat}`;
    if (action === 'Promotion' || action === 'Rétrogradation') texte = `${action} : ${gradeOrigine} → ${resultat}`;
    if (raison) texte += ` — Raison : ${raison}`;

    if (bouton) { bouton.disabled = true; bouton.textContent = '…'; }
    const ok = await ajouterLogEffectif(nom, texte, action === 'Promotion' || action === 'Rétrogradation' ? resultat : gradeOrigine);
    if (bouton) { bouton.disabled = false; bouton.textContent = 'Ajouter'; }

    if (msgEl) {
      msgEl.className = `log-add-msg ${ok ? 'ok' : 'fail'}`;
      msgEl.textContent = ok ? 'Log ajouté.' : "Écrit localement mais pas encore synchronisé côté Sheet (vérifie l'Apps Script).";

    if (raisonEl) raisonEl.value = '';
    setTimeout(() => afficherLogsAdmin(), 900);

  function construireLigneTableau(l, modifiable) {
    const medailleVide = medailleEstVide(l.medaille);

    if (!modifiable) {
      return `

    }

    const enEdition = lignesEnEdition.has(l.matricule);

    if (!enEdition) {
      // Ligne en lecture (double vérification) : les valeurs sont affichées
      // normalement, avec un bouton « Modifier » qui bascule la ligne en édition.
      return `
        <tr>
          <td class="cell-matricule" data-label="Matricule">${l.matricule}</td>
          <td data-label="Grade médical"><span class="grade-pill ${classeGrade(l.grade)}">${construireInsigneGrade(l.grade)}${l.grade || '—'}</span></td>

        </tr>
      `;
    }

    // Ligne en édition (double vérification uniquement) : grade, rapport et
    // médaille passent en menus déroulants à valeurs fermées ; le Steam ID
    // reste affiché en lecture seule (non concerné par cette édition rapide).
    return `

          <button class="btn-effectif-save" onclick="enregistrerLigneEffectif(this)">Enregistrer</button>

        </td>

  async function enregistrerLigneEffectif(bouton) {
    const tr = bouton.closest('tr');
    if (!tr) return;
    const matricule = tr.getAttribute('data-matricule');
    const gradeOrigine = tr.getAttribute('data-grade-origine') || '';
    const rapportOrigine = tr.getAttribute('data-rapport-origine') || '';
    const medailleOrigine = tr.getAttribute('data-medaille-origine') || '';
    const champs = {};
    tr.querySelectorAll('[data-champ]').forEach((champ) => {
      champs[champ.dataset.champ] = (champ.value || '').trim();
    });

    const texteOriginal = bouton.textContent;
    bouton.disabled = true;
    bouton.textContent = '…';

    try {
      await envoyerMiseAJourEffectif(matricule, champs);

      // Journalisation : un "up" = le rapport augmente (valeur numérique
      // uniquement — "Exempter" n'est pas comptabilisé comme un up) ; une
      // médaille "donnée" = le champ médaille passe à une valeur non vide ;
      // un changement de grade = promotion ou rétrogradation selon la
      // hiérarchie définie dans GRADES_DISPONIBLES (du plus haut au plus bas).
      const gradeApres = (champs.grade || '').trim();
      let unLogAEchoue = false;
      if (gradeApres && gradeOrigine && gradeApres.toLowerCase() !== gradeOrigine.toLowerCase()) {
        const indexAvant = GRADES_DISPONIBLES.findIndex(g => g.toLowerCase() === gradeOrigine.toLowerCase());
        const indexApres = GRADES_DISPONIBLES.findIndex(g => g.toLowerCase() === gradeApres.toLowerCase());
        const estPromotion = indexAvant !== -1 && indexApres !== -1 ? indexApres < indexAvant : true;
        const libelle = estPromotion ? 'Promotion' : 'Rétrogradation';
        const ok = await ajouterLogEffectif(matricule, `${libelle} : ${gradeOrigine} → ${gradeApres}`, gradeApres);
        if (!ok) unLogAEchoue = true;
      }

      const rapportAvant = Number(rapportOrigine);
      const rapportApres = Number(champs.rapport);
      if (!isNaN(rapportAvant) && !isNaN(rapportApres) && rapportApres > rapportAvant) {
        const ok = await ajouterLogEffectif(matricule, `UP rapport : ${rapportAvant} → ${rapportApres}`, gradeApres || gradeOrigine);
        if (!ok) unLogAEchoue = true;
      }
      const medailleApres = (champs.medaille || '').trim();
      const medailleOrigineTrim = medailleOrigine.trim();
      if (!medailleEstVide(medailleApres) && medailleApres.toLowerCase() !== medailleOrigineTrim.toLowerCase()) {
        const ok = await ajouterLogEffectif(matricule, `Médaille donnée : ${medailleApres}`, gradeApres || gradeOrigine);
        if (!ok) unLogAEchoue = true;
      } else if (medailleEstVide(medailleApres) && !medailleEstVide(medailleOrigineTrim)) {
        const ok = await ajouterLogEffectif(matricule, `Médaille retirée : ${medailleOrigineTrim}`, gradeApres || gradeOrigine);
        if (!ok) unLogAEchoue = true;
      }

      // Met à jour le cache local pour un affichage immédiat, sans attendre
      // le prochain rafraîchissement automatique.
      const ligne = derniereListeEffectif.find(x => x.matricule === matricule);
      if (ligne) {
        if ('grade' in champs) ligne.grade = champs.grade;
        if ('rapport' in champs) ligne.rapport = champs.rapport;
        if ('medaille' in champs) ligne.medaille = champs.medaille;
      }

      bouton.textContent = unLogAEchoue ? 'Enregistré (journal ⚠)' : 'Enregistré ✓';
      setTimeout(() => {
        lignesEnEdition.delete(matricule);
        redessinerTableauEffectif();
      }, unLogAEchoue ? 2200 : 900);
    } catch (e) {
      console.error('Erreur de mise à jour de l\'effectif :', e);
      bouton.textContent = 'Échec';
      setTimeout(() => {
        bouton.textContent = texteOriginal;
        bouton.disabled = false;
      }, 2000);
    }
  }
