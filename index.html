  // ligne "DoubleVerifSite" par personne). Le panneau fonctionne donc en
  // mode recherche : on tape un matricule, on charge SES permissions
  // actuelles, on coche/décoche, puis on enregistre. Pour ajouter une
  // NOUVELLE fonction protégée, ajoute-la simplement dans FONCTIONS_PERMISSION
  // (plus haut dans le fichier) : elle apparaîtra ici automatiquement.
  let matriculeEnEditionPermission = '';

  async function afficherPermissionsAdmin() {
    marquerOngletAdminActif('ongletAdminPermission');
    const contenu = document.getElementById('adminContenu');
    const boiteAdmin = document.getElementById('adminWrapBox');
    if (!contenu) return;
    arreterAutoRefreshEffectif();
    if (boiteAdmin) boiteAdmin.classList.remove('admin-wrap-large');

    contenu.innerHTML = `
      <div class="admin-liste-titre">Permission</div>
      <div class="admin-liste-vide" style="margin-bottom:14px;">Cherche un matricule pour voir et modifier ses fonctions activées. L'amorce (${ADMINS_AMORCE.join(', ')}) garde toujours "Administration", même décochée.</div>
      <div class="rapport-validation" style="margin-bottom:14px;">
        <div class="rapport-validation-head">Rechercher un matricule</div>
        <div class="rapport-validation-item">
          <div class="log-add-form" style="margin:0;">
            <input type="text" id="permissionMatriculeRecherche" placeholder="matricule" value="${echapperAttr(matriculeEnEditionPermission)}">
            <button class="btn-cell-action enregistrer" onclick="chargerPermissionsMatricule()">Charger</button>
          </div>
        </div>
      </div>
      <div id="permissionZoneDroits"></div>
    `;

    if (matriculeEnEditionPermission) {
      chargerPermissionsMatricule();
    }
  }

  async function chargerPermissionsMatricule() {
    const champ = document.getElementById('permissionMatriculeRecherche');
    const matricule = (champ?.value || '').trim().toLowerCase();
    const zone = document.getElementById('permissionZoneDroits');
    if (!matricule) { if (zone) zone.innerHTML = ''; return; }
    matriculeEnEditionPermission = matricule;
    if (!zone) return;

    zone.innerHTML = '<div class="admin-liste-vide">Chargement…</div>';
    try {
      const droits = await lireDroitsMatricule(matricule);
      zone.innerHTML = construireBlocDroitsMatricule(matricule, droits);
    } catch (erreur) {
      zone.innerHTML = `<div class="admin-liste-vide">Impossible de charger les permissions. Vérifie que l'action 'lireDoubleVerifSite' est bien déployée côté Apps Script.</div>`;
    }
  }

  function construireBlocDroitsMatricule(matricule, droits) {
    const amorce = ADMINS_AMORCE.includes(matricule);
    return `
      <div class="rapport-validation">
        <div class="rapport-validation-head">Fonctions de ${echapperHtml(matricule)}</div>
        <div class="rapport-validation-item">
          ${FONCTIONS_PERMISSION.map((f) => {
            const force = amorce && f.cle === 'administration';
            const actif = force || droits[f.cle] === true;
            return `
              <label style="display:flex; align-items:flex-start; gap:8px; margin-top:10px; font:600 12px 'JetBrains Mono', monospace; color:#dbe9f0;">
                <input type="checkbox" id="permissionCase_${f.cle}" ${actif ? 'checked' : ''} ${force ? 'disabled title="Amorce : toujours actif"' : ''}>
                <span>${f.label}${force ? ' (amorce)' : ''}<br><span style="font-weight:400; color:#9fb4bd; text-transform:none; letter-spacing:0;">${f.description}</span></span>
              </label>
            `;
          }).join('')}
          <div style="margin-top:14px;">
            <button class="rapport-validation-btn" onclick="enregistrerPermissionsMatricule('${echapperAttr(matricule)}')">Enregistrer</button>
          </div>
        </div>
      </div>
    `;
  }

  async function enregistrerPermissionsMatricule(matricule) {
    const permissions = {};
    FONCTIONS_PERMISSION.forEach((f) => {
      const case_ = document.getElementById(`permissionCase_${f.cle}`);
      if (case_ && !case_.disabled) permissions[f.cle] = case_.checked;
    });
    try {
      await enregistrerDroitsMatricule(matricule, permissions);
      chargerPermissionsMatricule();
    } catch (erreur) {
      alert(erreur.message || "Impossible d'enregistrer ces permissions pour l'instant. Vérifie que l'action 'majDoubleVerifSite' est bien déployée côté Apps Script.");
    }
  }

  // Masque seulement le journal dans ce navigateur. Le Google Sheet reste intact.
  function supprimerTousLogsLocalement() {
    if (!confirm('Masquer tous les logs sur cet appareil ? Le Google Sheet ne sera pas modifié.')) return;
    const masques = lireLogsMasquesLocalement();
    lireCacheLogs().forEach(log => masques.add(cleLogLocale(log)));
    localStorage.setItem(CLE_LOGS_MASQUES_LOCAL, JSON.stringify([...masques]));
    localStorage.removeItem(CLE_LOGS_CACHE);
    afficherLogsAdmin();
  }

  // Clique sur une entrée du journal : révèle/masque son bouton "Supprimer".
  // Une seule entrée ouverte à la fois pour rester lisible.
  function basculerLogOuvert(li, event) {
    if (event && event.target.closest('.log-delete-btn')) return;
    const dejaOuverte = li.classList.contains('log-ouvert');
    document.querySelectorAll('#adminLogsListe .log-entry.log-ouvert').forEach(el => el.classList.remove('log-ouvert'));
    if (!dejaOuverte) li.classList.add('log-ouvert');
  }

  async function supprimerLogClique(bouton) {
    const li = bouton.closest('.log-entry');
    if (!li) return;
    const estNonSynchronise = li.dataset.nonSynchronise === 'true';
    const confirmation = estNonSynchronise
      ? 'Supprimer ce log non synchronisé de cet appareil ? Il n’est pas présent dans Google Sheet.'
      : 'Supprimer définitivement cette ligne du journal ?';
    if (!confirm(confirmation)) return;

    const date = li.dataset.date;
    const nom = li.dataset.nom;
    const texte = li.dataset.texte;

    bouton.disabled = true;
    bouton.textContent = '…';
    try {
      // Un log non synchronisé n'existe que dans le cache de ce navigateur :
      // aucun appel Google Sheet n'est nécessaire (ni possible) pour l'effacer.
      if (!estNonSynchronise) {
        await appelerWebApp('supprimerLog', { date, matricule: nom, texte });
      }
      const cache = lireCacheLogs().filter(l => !(l.date === date && l.matricule === nom && l.texte === texte));
      ecrireCacheLogs(cache);
      afficherLogsAdmin();
    } catch (e) {
      console.error('Suppression du log impossible :', e);
      bouton.disabled = false;
      bouton.textContent = 'Échec — réessayer';
      bouton.title = e.message || '';
    }
  }

  // === Salon Rapport MDC : l'identité est toujours celle de la session active. ===
  const CLE_RAPPORTS_MDC_CACHE = 'gdaRapportsMdcCache';
  const CLE_RAPPORTS_MASQUES_LOCAL = 'gdaRapportsMdcMasquesLocalement';

  function lireRapportsMasquesLocalement() {
    try { return new Set(JSON.parse(localStorage.getItem(CLE_RAPPORTS_MASQUES_LOCAL) || '[]')); }
    catch (e) { return new Set(); }
  }

  function rapportEstMasqueLocalement(rapport) {
    return lireRapportsMasquesLocalement().has(String(rapport.id || ''));
  }

  function masquerRapportLocalement(id, bouton) {
    if (!confirm('Masquer ce rapport sur cet appareil ? Il restera dans le Google Sheet.')) return;
    const masques = lireRapportsMasquesLocalement();
    masques.add(String(id));
    localStorage.setItem(CLE_RAPPORTS_MASQUES_LOCAL, JSON.stringify([...masques]));
    const ligne = bouton && bouton.closest('.rapport-validation-item');
    if (ligne) ligne.remove();
  }

  function boutonMasquerRapport(rapport) {
    return `<div class="rapport-validation-actions"><button class="rapport-validation-btn" style="border-color:#e38a83; background:rgba(160,49,49,.2); color:#ffd0cc;" onclick="masquerRapportLocalement('${echapperAttr(rapport.id)}', this)">Masquer localement</button></div>`;
  }

  function lireRapportsMdc() {
    try {
      const rapports = JSON.parse(localStorage.getItem(CLE_RAPPORTS_MDC_CACHE) || '[]');
      return Array.isArray(rapports) ? rapports : [];
    } catch { return []; }
  }

  function ecrireRapportsMdc(rapports) {
    localStorage.setItem(CLE_RAPPORTS_MDC_CACHE, JSON.stringify(rapports.slice(0, 200)));
  }

  function echapperHtml(valeur) {
    return String(valeur ?? '').replace(/[&<>'"]/g, caractere => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[caractere]));
  }

  function formaterDateRapport(date) {
    try {
      return new Intl.DateTimeFormat('fr-FR', { dateStyle: 'short', timeStyle: 'short' }).format(new Date(date));
    } catch { return date || '—'; }
  }

  async function chargerRapportsMdc() {
    try {
      const resultat = await appelerWebApp('listeMesRapports', { matricule: matriculeActif });
      if (Array.isArray(resultat.rapports)) {
        ecrireRapportsMdc(resultat.rapports);
        return resultat.rapports;
      }
    } catch (erreur) {
      console.warn('Historique des rapports indisponible :', erreur);
    }
    return lireRapportsMdc().filter(rapport => rapport.matricule === matriculeActif);
  }

  async function dessinerHistoriqueRapports() {
    const zone = document.getElementById('rapportHistorique');
    const total = document.getElementById('rapportTotal');
    const reanimationsTotal = document.getElementById('rapportReanimationsTotal');
    if (!zone) return;
    const rapports = (await chargerRapportsMdc())
      .sort((a, b) => new Date(b.date) - new Date(a.date));
    if (total) total.textContent = rapports.length;
    if (reanimationsTotal) reanimationsTotal.textContent = rapports.reduce((somme, rapport) => somme + Number(rapport.reanimations || 0), 0);
    zone.innerHTML = rapports.length ? rapports.map(rapport => `
      <article class="rapport-history-item">
        <div class="rapport-history-top"><span>${formaterDateRapport(rapport.date)}</span><span>${echapperHtml(rapport.grade || '—')}</span></div>
        <div class="rapport-history-values"><span>⚕ ${Number(rapport.reanimations || 0)} réanimation(s)</span><span>✚ ${Number(rapport.soins || 0)} soin(s)</span></div>
        <div class="rapport-history-comment">${echapperHtml(rapport.commentaire || 'Aucun commentaire.')}</div>
        ${rapport.nonSynchronise ? '<div class="rapport-history-sync">⚠ En attente de synchronisation</div>' : ''}
      </article>
    `).join('') : '<div class="rapport-history-empty"><span class="empty-icon">🗂️</span><strong>Aucun rapport envoyé</strong><br>Votre premier rapport apparaîtra ici.</div>';
  }

  async function dessinerValidationRapports() {
    const zone = document.getElementById('rapportValidation');
    if (!zone || !aAccesGestionRapports(matriculeActif)) return;
    zone.innerHTML = '<div class="rapport-history-empty">Chargement des rapports en attente…</div>';
    try {
      const resultat = await appelerWebApp('listeRapportsEnAttente', { validateur: matriculeActif });
      const rapports = (Array.isArray(resultat.rapports) ? resultat.rapports : []).filter(rapport => !rapportEstMasqueLocalement(rapport));
      zone.innerHTML = rapports.length ? `
        <div class="rapport-validation"><div class="rapport-validation-head">${rapports.length} rapport(s) à valider</div>
          ${rapports.map(rapport => `<div class="rapport-validation-item">
            <strong>${echapperHtml(rapport.matricule)} · ${echapperHtml(rapport.grade)}</strong>
            <div class="rapport-history-values"><span>⚕ ${Number(rapport.reanimations || 0)} réa.</span><span>✚ ${Number(rapport.soins || 0)} soin(s)</span></div>
            <p>${echapperHtml(rapport.commentaire || 'Aucun commentaire.')}</p>
            ${boutonsActionsRapport(rapport)}
            ${boutonMasquerRapport(rapport)}
          </div>`).join('')}
        </div>` : '<div class="rapport-history-empty"><strong>Aucun rapport en attente</strong><br>Les nouveaux rapports apparaîtront ici.</div>';
    } catch (erreur) {
      console.warn('File de validation indisponible :', erreur);
      zone.innerHTML = '';
    }
  }

  async function validerRapportMDC(id, bouton) {
    if (!confirm('Valider ce rapport ? Le compteur de rapport de son auteur sera augmenté.')) return;
    bouton.disabled = true;
    bouton.textContent = 'Validation…';
    try {
      await appelerWebApp('validerRapport', { id, validateur: matriculeActif });
      await Promise.all([dessinerHistoriqueRapports(), dessinerValidationRapports()]);
    } catch (erreur) {
      bouton.disabled = false;
      bouton.textContent = 'Échec — réessayer';
      alert(erreur.message || 'Impossible de valider le rapport.');
    }
  }

  // Construit les boutons d'action affichés sur un rapport (file d'attente,
  // archives, ou recherche par matricule), selon les permissions du
  // matricule connecté :
  //   - "Valider le rapport"  : uniquement si le rapport est "En attente" ET
  //     permission 'validerRapports' (voir validerRapportMDC ci-dessus).
  //   - "Supprimer" : permission 'supprimerRapports' (voir supprimerRapportMDC
  //     ci-dessous). Fonctionne quel que soit le statut du rapport.
  // Exemple d'ajout d'une nouvelle fonction protégée sur les rapports :
  // ajoute une clé dans FONCTIONS_PERMISSION, un bouton ici gated par
  // aPermission(matriculeActif, 'ta_cle'), et le contrôle serveur
  // correspondant dans Rapports MDC.gs.
  function boutonsActionsRapport(rapport) {
    const boutons = [];
    if (rapport.statut === 'En attente' && aPermission(matriculeActif, 'validerRapports')) {
      boutons.push(`<button class="rapport-validation-btn" onclick="validerRapportMDC('${echapperAttr(rapport.id)}', this)">Valider le rapport</button>`);
    }
    if (aPermission(matriculeActif, 'supprimerRapports')) {
      boutons.push(`<button class="rapport-validation-btn" style="border-color:#e38a83; background:rgba(160,49,49,.2); color:#ffd0cc;" onclick="supprimerRapportMDC('${echapperAttr(rapport.id)}', this)">Supprimer</button>`);
    }
    return boutons.length ? `<div class="rapport-validation-actions">${boutons.join('')}</div>` : '';
  }

  async function supprimerRapportMDC(id, bouton) {
    if (!confirm('Supprimer définitivement ce rapport ? Cette action est irréversible.')) return;
    bouton.disabled = true;
    bouton.textContent = 'Suppression…';
    try {
      await appelerWebApp('supprimerRapport', { id, validateur: matriculeActif });
      await Promise.all([
        dessinerHistoriqueRapports(),
        dessinerValidationRapports(),
        document.getElementById('titreListeRapports')?.textContent === 'Archives rapports MDC' ? dessinerArchivesRapports() : Promise.resolve()
      ]);
    } catch (erreur) {
      bouton.disabled = false;
      bouton.textContent = 'Échec — réessayer';
      alert(erreur.message || 'Impossible de supprimer le rapport.');
    }
  }

  function afficherRapportMDC() {
    const zone = document.getElementById('contenuLienMDC');
    if (!zone) return;
    document.body.classList.add('lien-ouvert');
    arreterAutoRefreshEffectif();

    // Les comptes ayant accès à la gestion des rapports (validerRapports et/ou
    // supprimerRapports) accèdent uniquement à la file de validation.
    if (aAccesGestionRapports(matriculeActif)) {
      zone.innerHTML = `
        <section class="rapport-mdc-wrap">
          <header class="rapport-mdc-header">
            <div>
              <div class="rapport-mdc-kicker">Espace double verification</div>
              <h2>Validation des rapports MDC</h2>
              <p class="rapport-mdc-subtitle">Rapports en attente de validation.</p>
            </div>
          </header>
          <div class="rapport-mdc-grid" style="grid-template-columns: minmax(0, 1fr);">
            <section class="rapport-mdc-card">
              <div class="rapport-mdc-card-head">
                <span>Gestion des rapports</span><h3 id="titreListeRapports">Rapports en attente</h3>
                <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
                  <button id="boutonRapportsAttente" class="rapport-validation-btn" onclick="afficherListeRapportsMdc('attente')">Rapports en attente</button>
                  <button id="boutonArchivesRapports" class="rapport-validation-btn" style="border-color:#76c8f5; background:rgba(36,116,156,.22); color:#cceeff;" onclick="afficherListeRapportsMdc('archives')">Archives rapports MDC</button>
                </div>
                <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
                  <input id="rechercheRapportNom" type="search" placeholder="Rechercher un nom…" style="max-width:300px; padding:8px 10px; border:1px solid rgba(111,181,211,.35); border-radius:6px; background:#071522; color:#edf8ff;" onkeydown="if(event.key === 'Enter') rechercherRapportsParNom()">
                  <button class="rapport-validation-btn" style="border-color:#76c8f5; background:rgba(36,116,156,.22); color:#cceeff;" onclick="rechercherRapportsParNom()">Rechercher</button>
                </div>
              </div>
              <div id="rapportValidation"></div>
            </section>
          </div>
        </section>
      `;
      dessinerValidationRapports();
      return;
    }
    const nom = matriculeActif || '—';
    const grade = gradeActif || 'Grade non renseigné';
    const initiale = nom.charAt(0).toUpperCase() || '?';
    zone.innerHTML = `
      <section class="rapport-mdc-wrap">
        <header class="rapport-mdc-header">
          <div><div class="rapport-mdc-kicker">Espace GDA</div><h2>📝 Mes rapports</h2><p class="rapport-mdc-subtitle">Vos rapports personnels et leur état de traitement.</p></div>
          <div class="rapport-mdc-stats"><div class="rapport-stat"><strong id="rapportTotal">0</strong><span>Rapports</span></div><div class="rapport-stat"><strong id="rapportReanimationsTotal">0</strong><span>Réanimations</span></div></div>
        </header>
        <div class="rapport-mdc-grid">
          <section class="rapport-mdc-card">
            <div class="rapport-mdc-card-head"><span>Nouveau rapport</span><h3>Compte rendu médical</h3></div>
            <form class="rapport-mdc-form" id="rapportMdcForm">
              <div class="rapport-identite"><div class="rapport-identite-icon">${echapperHtml(initiale)}</div><div><strong>${echapperHtml(nom)}</strong><span>${echapperHtml(grade)} · identité verrouillée par la connexion</span></div></div>
              <div class="rapport-fields">
                <div class="rapport-field"><label for="rapportReanimations">Nombre de réanimations</label><input id="rapportReanimations" type="number" min="0" value="0" required></div>
                <div class="rapport-field"><label for="rapportSoins">Nombre de soins</label><input id="rapportSoins" type="number" min="0" value="0" required></div>
                <div class="rapport-field full"><label for="rapportCommentaire">Commentaire</label><textarea id="rapportCommentaire" maxlength="1500" placeholder="Précisions utiles sur votre activité médicale…"></textarea></div>
              </div>
              <button class="rapport-submit" type="submit">Envoyer le rapport</button>
              <div class="rapport-feedback" id="rapportFeedback"></div>
            </form>
          </section>
          <section class="rapport-mdc-card">
            <div class="rapport-mdc-card-head"><span>Historique personnel</span><h3>Mes rapports envoyés</h3></div>
            <div class="rapport-history" id="rapportHistorique"></div>
            <div id="rapportValidation"></div>
          </section>
        </div>
      </section>
    `;
    document.getElementById('rapportMdcForm').addEventListener('submit', envoyerRapportMDC);
    dessinerHistoriqueRapports();
    dessinerValidationRapports();
  }

  async function envoyerRapportMDC(event) {
    event.preventDefault();
    const bouton = event.currentTarget.querySelector('.rapport-submit');
    const feedback = document.getElementById('rapportFeedback');
    const reanimations = Number(document.getElementById('rapportReanimations').value);
    const soins = Number(document.getElementById('rapportSoins').value);
    const commentaire = document.getElementById('rapportCommentaire').value.trim();
    if (!Number.isInteger(reanimations) || reanimations < 0 || !Number.isInteger(soins) || soins < 0) {
      feedback.className = 'rapport-feedback fail';
      feedback.textContent = 'Indique des nombres entiers positifs ou nuls.';
      return;
    }
    const rapport = { matricule: matriculeActif, grade: gradeActif, reanimations, soins, commentaire, date: new Date().toISOString(), statut: 'En attente' };
    const rapports = lireRapportsMdc();
    rapports.unshift(rapport);
    ecrireRapportsMdc(rapports);
    bouton.disabled = true;
    bouton.textContent = 'Envoi…';
    try {
      // Le backend ajoute la demande à la file de validation partagée.
      await appelerWebApp('soumettreRapport', rapport);
      feedback.className = 'rapport-feedback ok';
      feedback.textContent = 'Rapport envoyé : en attente de validation.';
    } catch (erreur) {
      rapport.nonSynchronise = true;
      ecrireRapportsMdc(rapports);
      feedback.className = 'rapport-feedback fail';
      feedback.textContent = 'Rapport conservé sur cet appareil, en attente de synchronisation.';
    } finally {
      event.currentTarget.reset();
      document.getElementById('rapportReanimations').value = '0';
      document.getElementById('rapportSoins').value = '0';
      bouton.disabled = false;
      bouton.textContent = 'Envoyer le rapport';
      dessinerHistoriqueRapports();
    }
  }

  async function dessinerArchivesRapports() {
    const zone = document.getElementById('rapportValidation');
    if (!zone || !aAccesGestionRapports(matriculeActif)) return;
    zone.innerHTML = '<div class="rapport-history-empty">Chargement des archives…</div>';
    try {
      const resultat = await appelerWebApp('listeRapportsArchives', { validateur: matriculeActif });
      const rapports = (Array.isArray(resultat.rapports) ? resultat.rapports : []).filter(rapport => !rapportEstMasqueLocalement(rapport));
      zone.innerHTML = rapports.length ? `
        <div class="rapport-validation"><div class="rapport-validation-head">${rapports.length} rapport(s) archive(s)</div>
          ${rapports.map(rapport => `<div class="rapport-validation-item">
            <strong>${echapperHtml(rapport.matricule)} · ${echapperHtml(rapport.grade)}</strong>
            <div class="rapport-history-values"><span>⚕ ${Number(rapport.reanimations || 0)} réa.</span><span>✚ ${Number(rapport.soins || 0)} soin(s)</span></div>
            <p>${echapperHtml(rapport.commentaire || 'Aucun commentaire.')}</p>
            <p>Validé par ${echapperHtml(rapport.validateur || '—')} · ${formaterDateRapport(rapport.dateValidation)}</p>
            ${boutonsActionsRapport(rapport)}
            ${boutonMasquerRapport(rapport)}
          </div>`).join('')}
        </div>` : '<div class="rapport-history-empty"><strong>Aucune archive</strong><br>Les rapports validés apparaîtront ici.</div>';
    } catch (erreur) {
      console.warn('Archives des rapports indisponibles :', erreur);
      zone.innerHTML = '<div class="rapport-history-empty"><strong>Archives indisponibles</strong><br>Publiez la nouvelle version Apps Script.</div>';
    }
  }

  async function rechercherRapportsParNom() {
    const champ = document.getElementById('rechercheRapportNom');
    const zone = document.getElementById('rapportValidation');
    const titre = document.getElementById('titreListeRapports');
    const matricule = (champ?.value || '').trim();
    if (!zone || !matricule) return;
    if (titre) titre.textContent = 'Rapports de ' + matricule;
    zone.innerHTML = '<div class="rapport-history-empty">Recherche des rapports…</div>';
    try {
      const resultat = await appelerWebApp('listeRapportsParMatricule', { validateur: matriculeActif, matricule });
      const rapports = (Array.isArray(resultat.rapports) ? resultat.rapports : []).filter(rapport => !rapportEstMasqueLocalement(rapport));
      zone.innerHTML = rapports.length ? `
        <div class="rapport-validation"><div class="rapport-validation-head">${rapports.length} rapport(s) pour ${echapperHtml(matricule)}</div>
          ${rapports.map(rapport => `<div class="rapport-validation-item">
            <strong>${echapperHtml(rapport.matricule)} · ${echapperHtml(rapport.grade)}</strong>
            <div class="rapport-history-values"><span>⚕ ${Number(rapport.reanimations || 0)} réa.</span><span>✚ ${Number(rapport.soins || 0)} soin(s)</span><span>${echapperHtml(rapport.statut || '—')}</span></div>
            <p>${echapperHtml(rapport.commentaire || 'Aucun commentaire.')}</p>
            ${boutonsActionsRapport(rapport)}
            ${boutonMasquerRapport(rapport)}
          </div>`).join('')}
        </div>` : '<div class="rapport-history-empty"><strong>Aucun rapport trouvé</strong><br>Ce nom n’a pas encore envoyé de rapport.</div>';
    } catch (erreur) {
      zone.innerHTML = '<div class="rapport-history-empty"><strong>Recherche indisponible</strong><br>Publiez la nouvelle version Apps Script.</div>';
    }
  }

  function afficherListeRapportsMdc(vue) {
    const titre = document.getElementById('titreListeRapports');
    const attente = document.getElementById('boutonRapportsAttente');
    const archives = document.getElementById('boutonArchivesRapports');
    if (vue === 'archives') {
      if (titre) titre.textContent = 'Archives rapports MDC';
      if (archives) archives.style.filter = 'brightness(1.3)';
      if (attente) attente.style.filter = '';
      dessinerArchivesRapports();
    } else {
      if (titre) titre.textContent = 'Rapports en attente';
      if (attente) attente.style.filter = 'brightness(1.3)';
      if (archives) archives.style.filter = '';
      dessinerValidationRapports();
    }
  }

  function ouvrirLienMDC(index) {
    const bouton = boutonsActifs[index];
    if (!bouton) return;
    const zone = document.getElementById('contenuLienMDC');
    if (!zone) return;

    arreterAutoRefreshEffectif();

    // Si on quitte Administration pour une autre section du menu principal,
    // la barre fixe des 3 boutons Administration doit disparaître.
    if (bouton.label !== 'Administration') {
      document.body.classList.remove('mode-admin');
      fermerModaleEffectifReel();
    }

    // "Effectif MDC GDA" (menu principal) : tout le monde voit le tableau
    // recréé en lecture seule, SAUF les personnes ayant la permission
    // "edition_effectif" qui voient en plus un bouton "Modifier" (grade,
    // rapport, médaille) sur chaque ligne. L'accès au document Google Sheet
    // brut reste réservé au bouton "Administration".
    if (bouton.label === 'Effectif MDC GDA') {
      afficherEffectifRecree(aPermission(matriculeActif, 'edition_effectif'));
      return;
    }

    if (bouton.label === 'Réglement GDA') {
      afficherReglementGDA();
      return;
    }

    if (bouton.label === 'Matériel MDC GDA') {
      afficherMaterielMenu();
      return;
    }

    if (bouton.label === 'Rapport MDC GDA') {
      afficherRapportMDC();
      return;
    }

    if (bouton.label === 'Administration') {
      afficherAdministration();
      return;
    }

    document.body.classList.add('lien-ouvert');
    zone.innerHTML = `
      <div class="iframe-wrap">
        <iframe src="${bouton.url}" allow="fullscreen" allowfullscreen></iframe>
      </div>
    `;
  }

  function construireMenuBoutons() {
    boutonsActifs = obtenirBoutonsPourUtilisateur();
    return `
      <div class="menu-boutons">
        ${boutonsActifs.map((b, i) => `<button class="btn-lien-mdc ${b.label === 'Administration' ? 'btn-lien-admin' : ''}" onclick="ouvrirLienMDC(${i})">${b.label}</button>`).join('')}
      </div>
      <div id="contenuLienMDC"></div>
    `;
  }

  async function accorderAcces(valeur, grade) {
    matriculeActif = (valeur || '').toLowerCase();
    gradeActif = (grade || '').trim();
    document.querySelector('.console').classList.add('expanded');
    document.body.classList.add('mode-boutons');

    // Charge les permissions à jour avant de construire le menu, pour que le
    // bouton "Administration" (et donc l'onglet "Permission") apparaisse
    // correctement dès la connexion.
    await chargerPermissions();

    const docs = DOCUMENTS_SPECIAUX[valeur.toLowerCase()];
    const docsHtml = docs && docs.length
      ? `
        <div class="docs-panel">
          <div class="docs-title">Documents complémentaires</div>
          ${docs.map(d => `
            <a class="doc-link" href="${d.url}" target="_blank" rel="noopener">
              <span>${d.label}</span>
              <span class="arrow">→</span>
            </a>
          `).join('')}
        </div>
      `
      : '';

    const zonePrincipaleHtml = construireMenuBoutons();

    actionZone.innerHTML = `
      <div class="zone-principale">${zonePrincipaleHtml}</div>
      ${docsHtml}
    `;
    actionZone.classList.add('open');

    badgeMatricule.textContent = valeur;
    badgeGrade.textContent = grade || '—';
    if (badgeInsigne) badgeInsigne.innerHTML = construireInsigneGrade(grade);
    badgeCorner.classList.add('visible');
    document.getElementById('btnRefreshCorner')?.classList.add('visible');
  }

  const DUREE_TOTALE = 5000;
  const DUREE_PHASE = DUREE_TOTALE / 2; // 2500ms : 0→50%, puis 50%→100%

  function continuerPhase2(valeur, grade) {
    scanBar.style.display = 'flex';
    demarrerBarreScan(DUREE_PHASE, 50, 100);
    setStatus('scanning', 'Finalisation de l\'accès…');
    setTimeout(() => {
      arreterBarreScan();
      scanBar.style.display = 'none';
      statusZone.classList.remove('active');
      statusZone.innerHTML = '';
      bigStatus.innerHTML = '';
      accorderAcces(valeur, grade);
    }, DUREE_PHASE);
  }

  function verifier() {
    const valeur = input.value.trim();
    clearAll();

    if (!valeur) {
      setStatus('fail', 'Entrez un matricule avant de vérifier.');
      return;
    }

    verifyBtn.disabled = true;
    scanBar.style.display = 'flex';
    demarrerBarreScan(DUREE_PHASE, 0, 50);
    setStatus('scanning', 'Vérification en cours…');

    const debut = Date.now();

    chargerMatriculesDepuisSheet()
      .then((matriculesValides) => {
        const ecoule = Date.now() - debut;
        const attenteRestante = Math.max(0, DUREE_PHASE - ecoule);

        setTimeout(async () => {
          const grade = matriculesValides.get(valeur.toLowerCase());
          const trouve = matriculesValides.has(valeur.toLowerCase());
          arreterBarreScan();

          if (trouve) {
            const messageGrade = grade ? ` — Grade : ${grade}` : '';
            setStatus('ok', `Accréditation reconnue, bienvenue ${valeur}${messageGrade}.`);
            setBigStatus('ok', 'Autorisé');
            inputRow.style.display = 'none';

            // Double vérification Discord obligatoire pour tout le monde au
            // login (indépendante des permissions admin) — voir
            // FONCTIONS_PERMISSION plus haut pour les droits internes, qui
            // restent inchangés et gèrent seulement les boutons admin.
            const necessiteDoubleVerif = true;
            if (necessiteDoubleVerif) {
              // Le Worker demande une connexion Discord et compare l'ID obtenu
              // par Discord à celui associé au matricule, côté serveur.
              setTimeout(() => {
                setStatus('scanning', 'Redirection vers Discord pour confirmer votre compte…');
                const urlConnexion = new URL('/login', DISCORD_AUTH_WORKER_URL);
                urlConnexion.searchParams.set('matricule', valeur.toLowerCase());
                // Le Worker doit mémoriser cette adresse dans l'état OAuth et
                // y revenir après Discord. Ainsi la validation ne bascule pas
                // vers la racine GitHub Pages quand cette page est ouverte à
                // une autre adresse (par exemple /ore/modification.html).
                const urlRetour = new URL(window.location.href);
                ['discord_auth', 'token', 'reason'].forEach((cle) => urlRetour.searchParams.delete(cle));
                urlConnexion.searchParams.set('return_to', urlRetour.toString());
                fenetreConnexionDiscord = window.open(
                  urlConnexion.toString(),
                  'mdcDiscordAuth',
                  'width=520,height=720,resizable=yes,scrollbars=yes'
                );
                if (!fenetreConnexionDiscord) {
                  setStatus('fail', 'Autorise les fenêtres popup pour ouvrir la vérification Discord.');
                  setBigStatus('fail', 'Popup bloquée');
                  verifyBtn.disabled = false;
                }
              }, 1500);
            } else {
              fermerFenetreConnexionDiscord();
              verifyBtn.disabled = false;
              setTimeout(() => {
                statusZone.classList.remove('active');
                statusZone.innerHTML = '';
                bigStatus.innerHTML = '';
                continuerPhase2(valeur, grade);
              }, 1500);
            }
          } else {
            fermerFenetreConnexionDiscord();
            verifyBtn.disabled = false;
            scanBar.style.display = 'none';
            setStatus('fail', 'Accès refusé.');
            setBigStatus('fail', 'Refusé');
          }
        }, attenteRestante);
      })
      .catch((err) => {
        fermerFenetreConnexionDiscord();
        console.error('Erreur de vérification :', err);
        arreterBarreScan();
        scanBar.style.display = 'none';
        verifyBtn.disabled = false;
        setStatus('fail', 'Connexion à la base des accès impossible.');
      });
  }

  function verifierDiscordId() {
    if (!contexteEnAttente) return;
    const saisie = discordInput.value.trim();

    if (!saisie) {
      setStatus('fail', 'Entrez votre identifiant Discord.');
      return;
    }

    if (saisie === contexteEnAttente.discordIdAttendu) {
      const valeur = contexteEnAttente.valeur;
      const grade = contexteEnAttente.grade;
      discordRow.style.display = 'none';
      setStatus('ok', 'Identifiant Discord confirmé, accès complet accordé.');
      setBigStatus('ok', 'Autorisé');
      setTimeout(() => {
        statusZone.classList.remove('active');
        statusZone.innerHTML = '';
        bigStatus.innerHTML = '';
        continuerPhase2(valeur, grade);
      }, 1200);
    } else {
      scanBar.style.display = 'none';
      setStatus('fail', 'Identifiant Discord incorrect. Accès refusé.');
      setBigStatus('fail', 'Refusé');
    }
  }

  verifyBtn.addEventListener('click', verifier);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') verifier(); });
  discordVerifyBtn.addEventListener('click', verifierDiscordId);
  discordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') verifierDiscordId(); });

  // Le Worker revient ici après la connexion Discord avec un jeton signé,
  // valable 10 minutes. /verify contrôle sa signature avant tout accès.
  async function finaliserRetourConnexionDiscord(statut, token) {
    clearAll();
    fermerFenetreConnexionDiscord();

    if (statut !== 'success' || !token) {
      setStatus('fail', statut === 'refused'
        ? 'Ce compte Discord ne correspond pas au matricule demandé. Accès refusé.'
        : 'La confirmation Discord a échoué. Réessaie.');
      setBigStatus('fail', 'Refusé');
      return;
    }

    try {
      setStatus('scanning', 'Validation sécurisée de la connexion Discord…');
      const reponse = await fetch(`${DISCORD_AUTH_WORKER_URL}/verify?token=${encodeURIComponent(token)}`);
      if (!reponse.ok) throw new Error('Réponse du Worker invalide.');
      const acces = await reponse.json();
      const matricule = (acces.matricule || '').trim().toLowerCase();
      if (!acces.ok || !matricule) throw new Error('Jeton Discord invalide.');

      const matriculesValides = await chargerMatriculesDepuisSheet();
      if (!matriculesValides.has(matricule)) throw new Error('Matricule introuvable.');

      inputRow.style.display = 'none';
      setStatus('ok', 'Compte Discord confirmé. Accès complet accordé.');
      setBigStatus('ok', 'Autorisé');
      setTimeout(() => continuerPhase2(matricule, matriculesValides.get(matricule)), 900);
    } catch (erreur) {
      console.error('Erreur de validation Discord :', erreur);
      setStatus('fail', 'Impossible de valider la connexion Discord. Réessaie.');
      setBigStatus('fail', 'Refusé');
    }
  }

  async function traiterRetourConnexionDiscord() {
    const url = new URL(window.location.href);
    const statut = url.searchParams.get('discord_auth');
    if (!statut) return;

    const token = url.searchParams.get('token');
    // Conserve l'URL complète du retour avant de retirer le jeton de la
    // fenêtre popup. Elle permet de renvoyer la validation dans l'onglet
    // Google Pages qui a lancé la vérification, même si postMessage est
    // bloqué ou perdu pendant les redirections OAuth.
    const urlRetour = url.toString();
    ['discord_auth', 'token', 'reason'].forEach((cle) => url.searchParams.delete(cle));
    window.history.replaceState({}, document.title, url.pathname + url.search + url.hash);
    if (window.opener && !window.opener.closed) {
      try {
        // Le retour se fait dans la page Google Pages d'origine : elle traite
        // alors le jeton dans son propre onglet et la popup peut se fermer.
        window.opener.location.replace(urlRetour);
      } catch (_) {
        // Secours : la page principale reste capable de terminer le flux sans
        // rechargement lorsque le navigateur refuse l'accès à location.
        window.opener.postMessage({ type: 'mdc-discord-auth', statut, token }, window.location.origin);
      }
      window.close();
      return;
    }
    await finaliserRetourConnexionDiscord(statut, token);
  }

  window.addEventListener('message', (event) => {
    if (event.origin !== window.location.origin || event.data?.type !== 'mdc-discord-auth') return;
    finaliserRetourConnexionDiscord(event.data.statut, event.data.token);
  });

  traiterRetourConnexionDiscord();

  // === Donne de l'épaisseur au logo qui tourne (effet "pièce de monnaie") ===
  // On empile plusieurs copies de l'image, décalées en profondeur (translateZ)
  // et légèrement assombries, derrière la face avant. Le tout tourne ensemble
  // (voir .coin { animation: spinY }), ce qui donne une tranche visible
  // pendant la rotation, comme la tranche d'une pièce.
  (function construireEpaisseurLogo() {
    const coin = document.getElementById('coinLogo');
    if (!coin) return;
    const front = coin.querySelector('.coin-front');
    if (!front) return;
    const src = front.querySelector('img').getAttribute('src');
    const alt = front.querySelector('img').getAttribute('alt') || '';
    const NB_COUCHES = 9;
    const PAS_Z = 1.4; // px entre chaque couche -> épaisseur totale ≈ NB_COUCHES * PAS_Z
    for (let i = 1; i <= NB_COUCHES; i++) {
      const couche = document.createElement('div');
      couche.className = 'coin-layer coin-tranche';
      couche.style.transform = `translateZ(-${(i * PAS_Z).toFixed(1)}px)`;
      couche.style.filter = `brightness(${(1 - i * 0.07).toFixed(2)})`;
      const img = document.createElement('img');
      img.src = src;
      img.alt = alt;
      couche.appendChild(img);
      coin.insertBefore(couche, front);
    }
  })();
</script>
